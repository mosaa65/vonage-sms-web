<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innama SMS System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>نظام إنما للرسائل (Innama)</h1>
    </header>
    <div class="container">
        <h2>إرسال رسالة نصية قصيرة</h2>
        <form id="smsForm">
            <div class="input-group">
                <label for="phone">رقم المستلم:</label>
                <input type="text" id="phone" placeholder="96777XXXXXXX" required>
            </div>
            <div class="input-group">
                <label for="message">نص الرسالة:</label>
                <textarea id="message" rows="5" placeholder="اكتب رسالتك هنا..." required></textarea>
            </div>
            <button type="submit" id="submitBtn">إرسال الآن</button>
        </form>
    </div>
    <script src="send-sms.js"></script>
</body>
</html>
