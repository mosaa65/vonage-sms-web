<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إرسال SMS - Vonage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>نظام إرسال الرسائل القصيرة</h2>
        <form id="smsForm">
            <input type="text" id="phone" placeholder="رقم الهاتف (مثال: 967770000000)" required>
            <textarea id="message" placeholder="اكتب رسالتك هنا..." required></textarea>
            <button type="submit">إرسال الرسالة</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
